baseline:
  backend: vllm
  mode: non_stream
  repeat: 2
  num_prompts: 40
  dimensions:
    concurrency: [1, 4, 8, 16]
    input_tokens: [128, 512, 2048]
    output_tokens: [128, 512]

stream_latency:
  backend: vllm
  mode: stream
  repeat: 2
  num_prompts: 20
  dimensions:
    concurrency: [1, 4, 8]
    input_tokens: [128, 2048]
    output_tokens: [128]
